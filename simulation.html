<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Lexical Analyzer — Simulation</title>

<style>
:root {
  --bg:#020617;
  --card:#0f172a;
  --border:#1e293b;
  --accent:#38bdf8;
  --text:#e5e7eb;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(120deg,#020617,#0f172a,#1e293b);
  color: var(--text);
  padding: 30px;
}

.page { max-width:1100px; margin:auto; }

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card {
  background: var(--card);
  padding:20px;
  border-radius:14px;
  border:1px solid var(--border);
}

textarea {
  width:100%;
  height:250px;
  background:#020617;
  color:white;
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
}

.controls {
  margin-top:10px;
}

button {
  padding:10px 16px;
  margin-right:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background: var(--accent);
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid var(--border);
}

th { color:#94a3b8; }
</style>
</head>

<body>

<div class="page">

<h1>⚙ Lexical Analyzer</h1>

<div class="grid">

<!-- LEFT -->
<div class="card">
<textarea id="code">int main() {
  int x = 10;
  return x;
}</textarea>

<div class="controls">
<button onclick="run()">Tokenize</button>
<button onclick="clearBox()">Clear</button>
</div>
</div>

<!-- RIGHT -->
<div class="card">
<table>
<thead>
<tr>
<th>#</th>
<th>Type</th>
<th>Value</th>
</tr>
</thead>
<tbody id="output"></tbody>
</table>
</div>

</div>

</div>

<script>
const KEYWORDS = ["int","float","if","else","for","while","return"];
const OPERATORS = ["+","-","*","/","=","<",">","==","!="];
const DELIMITERS = ["(",")","{","}",";",","];

function tokenize(code){
  let tokens = [];
  let words = code.match(/[a-zA-Z_][a-zA-Z0-9_]*|\d+|==|!=|[{}();=+\-*/<>]/g);

  if(!words) return [];

  words.forEach(word => {
    if(KEYWORDS.includes(word)){
      tokens.push({type:"KEYWORD", value:word});
    }
    else if(OPERATORS.includes(word)){
      tokens.push({type:"OPERATOR", value:word});
    }
    else if(DELIMITERS.includes(word)){
      tokens.push({type:"DELIMITER", value:word});
    }
    else if(/^\d+$/.test(word)){
      tokens.push({type:"INTEGER", value:word});
    }
    else if(/^[a-zA-Z_]/.test(word)){
      tokens.push({type:"IDENTIFIER", value:word});
    }
    else{
      tokens.push({type:"UNKNOWN", value:word});
    }
  });

  return tokens;
}

function run(){
  const code = document.getElementById("code").value;
  const tokens = tokenize(code);
  let html = "";

  tokens.forEach((t,i)=>{
    html += `<tr>
      <td>${i+1}</td>
      <td>${t.type}</td>
      <td>${t.value}</td>
    </tr>`;
  });

  document.getElementById("output").innerHTML = html;
}

function clearBox(){
  document.getElementById("code").value = "";
  document.getElementById("output").innerHTML = "";
}
</script>

</body>
</html>
